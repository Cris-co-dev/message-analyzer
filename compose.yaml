services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alert-api
    ports:
      - "8080:8080"
    networks:
      - app-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    networks:
      - app-network

networks:
  app-network:
    driver: bridge